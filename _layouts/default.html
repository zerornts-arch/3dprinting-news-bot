<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/mint9.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {% feed_meta %}
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    🌱 <strong>Vol.{{ site.posts.size }}</strong> — 매일, 3D 프린팅 세계를 전합니다
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="brand">
        <div class="brand-mark">✦</div>
        <div class="brand-text">
          <div class="brand-name">우민짱의 3D 프린팅</div>
          <div class="brand-tag">뉴스레터 아카이브</div>
        </div>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>홈</a>
        <a href="{{ '/search.html' | relative_url }}" {% if page.url contains 'search' %}class="active"{% endif %}>검색</a>
      </nav>
      <a href="{{ '/search.html' | relative_url }}" class="header-cta">뉴스 검색 →</a>
    </div>
  </header>

  <!-- CONTENT -->
  <main>
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div>© {{ 'now' | date: "%Y" }} <strong>{{ site.title }}</strong> · 매일 발행 · 총 {{ site.posts.size }}호</div>
    <div class="footer-links">
      <a href="{{ '/' | relative_url }}">홈</a>
      <a href="{{ '/search.html' | relative_url }}">아카이브 검색</a>
      <a href="{{ site.url }}{{ site.baseurl }}/feed.xml">RSS 피드</a>
    </div>
  </footer>

</body>
</html>

name: Daily News Briefing

on:
  schedule:
    # 한국시간 오전 10시 = UTC 01시 (정각 회피로 지연 최소화)
    - cron: '30 23 * * 0-4'  # 일~목 UTC 23:30 = 월~금 KST 08:30
  workflow_dispatch:          # 수동 실행 버튼 유지

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    # ✅ 새로 추가: GitHub Actions가 파일을 커밋할 수 있는 권한 부여
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 뉴스 브리핑 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python main.py

      # ✅ 새로 추가: 생성된 아카이브 파일을 자동으로 저장소에 커밋하고 푸시
      - name: 뉴스레터 아카이브 자동 커밋
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add _posts/
          if git diff --staged --quiet; then
            echo "📝 새로운 아카이브가 없습니다."
          else
            git commit -m "📰 뉴스레터 아카이브 자동 추가: $(date +'%Y-%m-%d')"
            git push
            echo "✅ 웹사이트 아카이브 업데이트 완료!"
          fi
